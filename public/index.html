<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Yai Data - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-base: #050505;
            --bg-panel: #0a0a0a;
            --bg-surface: #121212;
            --bg-hover: #1e1e1e;
            --bg-input: #111111;
            --accent: #ff6b35;
            /* Orange accent */
            --accent-light: #ff8c5f;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 24px;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #050505;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        /* Starry background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 2px;
            height: 2px;
            opacity: 0.3;
            box-shadow: 0 0 4px white;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(50px);
        }

        .orb-1 {
            top: 40%;
            left: 45%;
            width: 300px;
            height: 300px;
            background: #fbbf24;
        }

        .orb-2 {
            top: 60%;
            left: 55%;
            width: 150px;
            height: 150px;
            background: #ff7e67;
        }

        .orb-3 {
            top: 65%;
            left: 48%;
            width: 80px;
            height: 80px;
            background: #60a5fa;
        }

        #app {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Hidden elements for JS compatibility */
        #sidebar,
        #chat-header,
        #toast,
        .stoggle,
        #scroll-btn,
        #new-chat-btn,
        #clear-btn {
            display: none !important;
        }

        #chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Nav */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .logo-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35, #ff8c5f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.4);
            position: relative;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Messages Area */
        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 100px;
            scrollbar-width: none;
        }

        #messages::-webkit-scrollbar {
            display: none;
        }

        /* Welcome Screen */
        #welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        .bot-identity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .bot-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
        }

        .bot-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .bot-text b {
            color: var(--text-primary);
            font-size: 13px;
        }

        .greeting {
            font-size: 13px;
            color: var(--text-secondary);
            width: 100%;
            text-align: left;
            margin-bottom: 8px;
        }

        .question {
            font-size: 28px;
            font-weight: 500;
            width: 100%;
            text-align: left;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .sug-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .sug-btn {
            width: 100%;
            text-align: left;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sug-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* Chat Bubbles */
        .msg-wrap {
            width: 100%;
            max-width: 800px;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-wrap.user {
            align-items: flex-end;
        }

        .msg-wrap.assistant {
            align-items: flex-start;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .msg-wrap.user .msg-bubble {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-right-radius: 4px;
        }

        .msg-wrap.assistant .msg-bubble {
            background: transparent;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-bubble p {
            margin-bottom: 8px;
        }

        .msg-bubble p:last-child {
            margin-bottom: 0;
        }

        .msg-bubble pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .msg-bubble code {
            font-family: monospace;
            font-size: 12.5px;
            color: #a5f3fc;
        }

        .msg-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* Input Area at bottom */
        #input-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 650px;
            z-index: 10;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 10px 15px 10px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: rgba(255, 255, 255, 0.25);
        }

        .plus-icon {
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
        }

        #user-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            padding-top: 2px;
        }

        #user-input::placeholder {
            color: #555;
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #555;
            font-size: 16px;
        }

        .fast-text {
            font-size: 12px;
        }

        #send-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        #user-input:not(:placeholder-shown)~.input-actions #send-btn {
            display: block;
            color: var(--text-primary);
        }

        /* Hidden functional bits */
        #sdot {
            display: none;
        }

        .typing-ind {
            display: flex;
            gap: 5px;
            padding: 10px;
        }

        .tdot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .tdot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .tdot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
            }

            40% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="stars" id="star-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div id="history-list"></div>
            <div id="sdot"></div>
            <div id="stext"></div>
            <div id="chat-title"></div>
            <div id="mbadge"></div>
            <div id="chat-sub"></div>
        </div>

        <main id="chat-main">
            <div class="top-nav">
                <button class="back-btn">&lsaquo; Back</button>
                <div class="logo-row">
                    <div class="logo-circle">Yai</div>
                    <span class="logo-text">Yai Data</span>
                </div>
            </div>

            <div id="messages">
                <!-- Welcome will be injected here -->
            </div>

            <div id="input-area">
                <div class="input-wrap">
                    <span class="plus-icon">+</span>
                    <textarea id="user-input" rows="1" placeholder="Ask about the website..."
                        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <div class="input-actions">
                        <span class="fast-text">Fast</span>
                        <span class="kbd-icon">&#9000;</span>
                        <span class="mic-icon">&#127897;</span>
                        <button id="send-btn" onclick="sendMessage()" title="Send">&#10148;</button>
                    </div>
                </div>
                <label class="stoggle">
                    <div class="sw on" id="sw"></div>
                </label>
            </div>
        </main>
    </div>

    <script>
        // Generate random stars
        const starBg = document.getElementById('star-bg');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random() * 0.5 + 0.1;
            starBg.appendChild(star);
        }

        // ORIGINAL LOGIC (MODIFIED WELCOME SCREEN)
        const portStr = location.port ? `:${location.port}` : '';
        const API_BASE = `${location.protocol}//${location.hostname}${portStr}`;
        const EP_CHAT = `${API_BASE}/api/ai-agent`;
        const EP_CLEAR = `${API_BASE}/api/agent/clear`;
        const EP_HEALTH = `${API_BASE}/api/health`;

        let userId = localStorage.getItem('ai_uid') || `user_${Date.now()}`;
        localStorage.setItem('ai_uid', userId);
        let streamOn = true, busy = false;
        let sessions = JSON.parse(localStorage.getItem('ai_sessions') || '[]');
        let curSession = null;

        document.addEventListener('DOMContentLoaded', () => {
            showWelcome();
        });

        function showWelcome() {
            document.getElementById('messages').innerHTML = `<div id="welcome">
                <div class="bot-identity">
                    <div class="bot-icon">&#9783;</div>
                    <div class="bot-text"><b>Yai 2</b><br/>Website Assistant</div>
                </div>
                <div class="greeting">Hi Mr. Khun</div>
            </div>`;
        }

        function hideWelcome() { document.getElementById('welcome')?.remove(); }

        async function sendMessage() {
            if (busy) return;
            const inp = document.getElementById('user-input');
            const msg = inp.value.trim(); if (!msg) return;
            inp.value = ''; autoResize(inp);
            hideWelcome();
            appendMsg('user', msg);

            busy = true;
            await doStream(msg);
            busy = false;
        }

        async function doStream(msg) {
            const tid = showTyping();
            try {
                const res = await fetch(EP_CHAT, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message: msg, stream: true })
                });
                removeTyping(tid);
                const { wrapper, bubble } = appendMsg('assistant', '');
                const reader = res.body.getReader(), dec = new TextDecoder();
                let full = '';
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    let chunk = dec.decode(value, { stream: true });
                    chunk = chunk.replace(/\n?\[SUGGESTIONS:.*?\]/s, '');
                    chunk = chunk.replace(/\n?\[USAGE:.*?\]/s, '');
                    full += chunk;
                    bubble.innerHTML = md(full);
                    scrollToBottom();
                }
            } catch (e) { removeTyping(tid); appendMsg('assistant', `❌ Error: ${e.message}`); }
        }

        function appendMsg(role, text) {
            const msgs = document.getElementById('messages');
            const wrap = document.createElement('div'); wrap.className = `msg-wrap ${role}`;
            const meta = document.createElement('div'); meta.className = 'msg-meta';
            meta.innerHTML = role === 'assistant' ? 'Yai 2' : 'You';
            const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
            if (text) { bubble.innerHTML = md(text); }
            wrap.appendChild(meta); wrap.appendChild(bubble);
            msgs.appendChild(wrap); scrollToBottom();
            return { wrapper: wrap, bubble };
        }

        let tc = 0;
        function showTyping() {
            const id = `ty-${++tc}`, msgs = document.getElementById('messages'), w = document.createElement('div');
            w.className = 'msg-wrap assistant'; w.id = id;
            w.innerHTML = `<div class="msg-bubble"><div class="typing-ind"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
            msgs.appendChild(w); scrollToBottom(); return id;
        }
        function removeTyping(id) { document.getElementById(id)?.remove(); }

        function scrollToBottom() {
            const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight;
        }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
        function usePrompt(t) { const i = document.getElementById('user-input'); i.value = t; autoResize(i); i.focus(); }
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function md(raw) {
            if (!raw) return '';
            let s = raw;
            let html = esc(s);
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
            html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#60a5fa;text-decoration:underline;">$1</a>');
            const lines = html.split('\n');
            const out = []; let buf = [];
            for (const line of lines) {
                if (line.trim() === '') {
                    if (buf.length) { out.push(`<p>${buf.join('<br>')}</p>`); buf = []; }
                } else { buf.push(line); }
            }
            if (buf.length) out.push(`<p>${buf.join('<br>')}</p>`);
            return out.join('');
        }
    </script>
</body>

</html>
