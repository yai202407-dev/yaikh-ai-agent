name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main        # production deploys
      - dev         # staging deploys (optional)

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       asia-southeast1           # adjust if needed
  SERVICE_NAME: yaikh-ai-agent
  IMAGE:        asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/yaikh-ai/agent

jobs:
  # ── 1. BUILD & PUSH IMAGE ────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── 2. DEPLOY TO CLOUD RUN ───────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          # Secrets are injected from GCP Secret Manager (not hardcoded here)
          env_vars: |
            NODE_ENV=production
            LLM_PROVIDER=gemini
            GEMINI_MODEL=gemini-2.5-flash
            MODULE_SCOPE=AI_ADMIN\,AI_PRODUCTION\,AI_HR\,AI_QMS
            LANGCHAIN_PROJECT=Yorkmars Agent
            REPORT_BASE_URL=https://yaikh-ai-agent-dtbkajcrna-as.a.run.app
          secrets: |
            GEMINI_API_KEY=yaikh-gemini-api-key:latest
            LANGCHAIN_API_KEY=yaikh-langsmith-key:latest
            DB_HOST=yaikh-db-host:latest
            DB_PORT=yaikh-db-port:latest
            DB_USERNAME=yaikh-db-username:latest
            DB_PASSWORD=yaikh-db-password:latest
            DB_DATABASE=yaikh-db-name:latest
          flags: |
            --allow-unauthenticated
            --min-instances=1
            --max-instances=10
            --concurrency=80
            --memory=1Gi
            --cpu=1
            --timeout=300
            --vpc-connector=yaikh-connector
            --vpc-egress=all-traffic

      - name: Output service URL
        run: echo "✅ Deployed to ${{ steps.deploy.outputs.url }}"
